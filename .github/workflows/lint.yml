name: Check Files Pass Lint
run-name: ${{ github.actor }} is pushing changes to Main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Down scope as necessary via https://docs.github.com/en/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
permissions:
  checks: write
  contents: write

jobs:
  Run-Linters:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.5"
      - name: Install dependencies in requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run flake8 Lint
        run: |
          flake8 --extend-ignore E501 app/calculator/__init__.py app/operations/__init__.py main.py
